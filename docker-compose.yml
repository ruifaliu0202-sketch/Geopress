services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: geopress-postgres
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geo_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo_app_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-geo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - geopress-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    image: geopress-api:${GEOPRESS_IMAGE_TAG:-local}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://geo_app:geo_app_dev_password@host.docker.internal:5432/geo?sslmode=disable}
    command: >
      sh -c 'until pg_isready -d "$$DATABASE_URL" >/dev/null 2>&1; do
        echo "waiting for postgres";
        sleep 2;
      done;
      /app/scripts/migrate.sh'
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    image: geopress-api:${GEOPRESS_IMAGE_TAG:-local}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    shm_size: "1gb"
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_ADDR: :18080
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      DATABASE_URL: ${DATABASE_URL:-postgres://geo_app:geo_app_dev_password@host.docker.internal:5432/geo?sslmode=disable}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      AI_REQUEST_TIMEOUT_SECONDS: ${AI_REQUEST_TIMEOUT_SECONDS:-45}
      GEOPRESS_PROJECT_ROOT: /app
      GEOPRESS_NODE_BIN: /usr/local/bin/node
      GEOPRESS_CHROME_PATH: /usr/bin/chromium
      GEOPRESS_BROWSER_HEADLESS: ${GEOPRESS_BROWSER_HEADLESS:-true}
      GEOPRESS_CHROMIUM_NO_SANDBOX: ${GEOPRESS_CHROMIUM_NO_SANDBOX:-true}
    volumes:
      - geopress-runtime:/app/runtime
    ports:
      - "127.0.0.1:${API_PORT:-18080}:18080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: geopress-web:${GEOPRESS_IMAGE_TAG:-local}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  geopress-postgres-data:
  geopress-runtime:
