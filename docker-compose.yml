services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: geopress-postgres
    environment:
      POSTGRES_USER: geopress
      POSTGRES_PASSWORD: geopress
      POSTGRES_DB: geopress
    ports:
      - "5432:5432"
    volumes:
      - geopress-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geopress -d geopress"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  geopress-postgres-data:
